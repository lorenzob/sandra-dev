name: Droplet Scheduler (Manual)

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'start or stop'
        required: true
        type: choice
        options:
          - start
          - stop

jobs:
  manage-droplet:
    runs-on: ubuntu-latest
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.RESTART_CRON }}

      - name: Get droplet ID
        id: droplet
        run: |
          DROPLET_ID=$(doctl compute droplet list --format ID,Name --no-header | grep sandra-prod | awk '{print $1}')
          echo "id=$DROPLET_ID" >> $GITHUB_OUTPUT

      - name: Start droplet
        if: github.event.inputs.action == 'start'
        run: |
          STATUS=$(doctl compute droplet get ${{ steps.droplet.outputs.id }} --format Status --no-header)
          if [ "$STATUS" != "active" ]; then
            doctl compute droplet-action power-on ${{ steps.droplet.outputs.id }} --wait
          else
            echo "Droplet already running, skipping."
          fi
          
      - name: Stop droplet
        if: github.event.inputs.action == 'stop'
        run: |
          STATUS=$(doctl compute droplet get ${{ steps.droplet.outputs.id }} --format Status --no-header)
          if [ "$STATUS" != "off" ]; then
            doctl compute droplet-action shutdown ${{ steps.droplet.outputs.id }} --wait
          else
            echo "Droplet already stopped, skipping."
          fi
